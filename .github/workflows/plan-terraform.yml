name: Terraform Plan

on:
  pull_request:
    branches:
      - master
    paths:
      - 'AWS/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    uses: ./.github/workflows/template-plan-pipeline.yml
    with:
      working_directory: AWS
      aws_region: eu-central-1